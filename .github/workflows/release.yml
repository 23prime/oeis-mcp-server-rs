name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  APP_NAME: oeis-mcp-server

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: false
            asset_name: oeis-mcp-server-x86_64-unknown-linux-musl

          # Linux aarch64 (musl)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            asset_name: oeis-mcp-server-aarch64-unknown-linux-musl

          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            asset_name: oeis-mcp-server-x86_64-apple-darwin

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            asset_name: oeis-mcp-server-aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          target: ${{ matrix.target }}
          rustflags: ""
          cache: false

      - name: Install musl tools (Linux x86_64)
        if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        run: |
          sudo apt update -qq
          sudo apt install -y musl-tools

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (native)
        if: ${{ !matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target="$TARGET"

      - name: Build binary (cross)
        if: ${{ matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
        run: cross build --release --target="$TARGET"

      - name: Prepare asset
        env:
          TARGET: ${{ matrix.target }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          mkdir -p dist
          cp "target/$TARGET/release/$APP_NAME" "dist/$ASSET_NAME"
          chmod +x "dist/$ASSET_NAME"

      - name: Create tarball
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          cd dist
          tar czf "$ASSET_NAME.tar.gz" "$ASSET_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum ./*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$GITHUB_REF" == *"alpha"* ]] || [[ "$GITHUB_REF" == *"beta"* ]] || [[ "$GITHUB_REF" == *"rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # shellcheck disable=SC2086
          gh release create "${STEPS_VERSION_OUTPUTS_VERSION}" \
            --title "Release ${STEPS_VERSION_OUTPUTS_VERSION}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release-assets/*.tar.gz release-assets/SHA256SUMS
