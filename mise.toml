# ================================================================
# Settings
# ================================================================
[settings]
auto_install = false
install_before = "3d"


# ================================================================
# Tools
# ================================================================
[tools]

# Markdown
markdownlint-cli2 = "0.22"

# GitHub Actions
actionlint = "1"
shellcheck = "0.11"
"github:zizmorcore/zizmor" = "1"

# Other tools
lefthook = "2"
cspell = "9"
watchexec = "2"

# integration test
pnpm = "10"

# ================================================================
# Tasks
# See: https://mise.jdx.dev/tasks/toml-tasks.html
# ================================================================

# Global
[tasks.setup]
description = "Setup tools"
run = ["mise trust -yq", "mise install", "lefthook install"]
alias = "s"

[tasks.fix]
description = "Fix all issues"
depends = ["md-fix", "gh-fix", "rs-fix", "test-fix"]
alias = "f"

[tasks.check]
description = "Check for all issues"
depends = ["md-check", "gh-check", "spell-check", "rs-check", "test-check"]
alias = "c"

[tasks.fix-and-check]
run = [{ task = "fix" }, { task = "check" }]
description = "Fix all issues and check for issues"
alias = "fc"

# Markdown
[tasks.md-fix]
description = "Fix Markdown issues"
run = "markdownlint-cli2 '**/*.md' --fix"
alias = "mf"

[tasks.md-check]
description = "Check for Markdown issues"
run = "markdownlint-cli2 '**/*.md'"
alias = "mc"

# GitHub Actions
[tasks.gh-fix]
description = "Fix GitHub Actions workflows"
run = "zizmor --fix=all ."
alias = "ghf"

[tasks.gh-check]
description = "Check GitHub Actions workflows"
run = [
  "actionlint .github/workflows/*.yml",
  "zizmor . --persona=pedantic --min-severity=medium",
]
alias = "ghc"

# Spell Check
[tasks.spell-check]
description = "Check spelling"
run = "cspell . --gitignore --verbose"
alias = "sc"

# Rust
[tasks.rs-install]
description = "Install Rust dependencies"
run = "cargo fetch"

[tasks.rs-versions]
description = "Show Rust versions"
run = ["rustc --version", "cargo --version"]

[tasks.rs-dev]
description = "Run Rust application with hot-reloading on changes"
run = "watchexec -e rs -r cargo run"
alias = "rd"

[tasks.rs-fix]
description = "Fix Rust code"
run = [
  "cargo clippy --all-targets --all-features --no-deps --fix --allow-dirty",
  "cargo fmt",
]
alias = "rf"

[tasks.rs-check]
description = "Check Rust code"
run = [
  "cargo clippy --all-targets --all-features --no-deps",
  "cargo fmt -- --check",
  "cargo test -- --nocapture",
]
alias = "rc"

[tasks.rs-build]
description = "Build Rust application"
run = "cargo build"

[tasks.rs-build-release]
description = "Build Rust application in release mode"
run = "cargo build --release"

[tasks.rs-clean]
description = "Clean Rust build artifacts"
run = "cargo clean"

# Integration tests
[tasks.test-install]
description = "Install integration test dependencies"
run = ["pnpm install --frozen-lockfile"]
dir = "integration_tests"
alias = "ti"

[tasks.test-fix]
description = "Fix integration test code"
run = ["pnpm run format"]
dir = "integration_tests"
alias = "tf"

[tasks.test-check]
description = "Check integration tests"
run = ["pnpm run format:check"]
dir = "integration_tests"
alias = "tc"

[tasks.test-run]
description = "Run integration tests"
run = ["pnpm run test"]
dir = "integration_tests"
alias = "tr"

# Release
[tasks.tag]
description = "Create release tag from Cargo.toml version"
run = "./create-release-tag.sh"

[tasks.tag-push]
description = "Push release tags to remote"
run = "git push --follow-tags"
